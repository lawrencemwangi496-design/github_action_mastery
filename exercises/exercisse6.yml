---
name: ssh into server
on:
  push:
    branches: [main]
env:
  ssh: ${{ secrets.SSH_PRIVATE_KEY }}
  ip: ${{ secrets.SERVER_IP }}
  user: ${{ secrets.SERVER_USERNAME }}

jobs:
  file:
    runs-on: ubuntu-latest
    steps:
      - name: ssh file
        run: |
          printf '%s' "$ssh" > key.pem
          chmod 600 key.pem
      - name: add server to known host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$ip" >> ~/.ssh/known_hosts
      - name: create file
        run: |
            ssh -i key.pem $user@$ip "
            mkdir -p ~/test
            echo 'hello there this is github actions' > ~/test/hello.txt
            "
      - name: deleting key.pem
        if: ${{ always() }}
        run: rm key.pem