---
name: eviomnetal variable and secrets
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_NAME: "temphost"
  REGISTRY: "ghcr.io"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: "${{ github.sha }}"
    steps:
      - name: "printing vars"
        run: |
          echo "APP_NAME: $APP_NAME"
          echo "REGISTRY: $REGISTRY"
          echo "IMAGE_NAME: $IMAGE_NAME"
      - name: "printing the user and branch"
        run: |
          echo "${{ github.repository}}"
          echo "${{ github.ref_name}}"
          echo ${{ github.actor}}