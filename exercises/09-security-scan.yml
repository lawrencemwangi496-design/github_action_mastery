# Exercise 9: Comprehensive Security Scanning
# 
# Learning Objectives:
# - Multiple security tools integration
# - Conditional job execution based on trigger type
# - Scheduled security audits
# - Manual security scans with environment selection
# - Combining SAST, dependency, and secret scanning
#
# Tools integrated:
# - npm audit: Node.js dependency vulnerabilities
# - Trivy: Filesystem vulnerability scanning
# - TruffleHog: Secret/credential detection
#
# Trigger methods:
# - push/PR: automatic scans
# - schedule: daily at 6am UTC
# - workflow_dispatch: manual with scope selection
#
# Each job runs only when relevant options are selected,
# demonstrating sophisticated conditional logic.

name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"  # Daily at 6am UTC
  workflow_dispatch:
    inputs:
      environment:
        description: "Security scan scope"
        required: true
        default: vulnerabilities
        type: choice
        options:
          - vulnerabilities
          - dependencies
          - leaks
          - full

jobs:
  audit:
    if: >
      ${{ github.event.inputs.environment == 'dependencies' ||
          github.event_name == 'schedule' ||
          github.event.inputs.environment == 'full' ||
          github.event_name == 'pull_request' ||
          github.event_name == 'push' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./learnhub-central
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Run npm security audit
        run: npm audit --audit-level=high
  
  security:
    if: >
      ${{ github.event.inputs.environment == 'vulnerabilities' ||
          github.event_name == 'schedule' ||
          github.event.inputs.environment == 'full' ||
          github.event_name == 'pull_request' ||
          github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "learnhub-central"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
  
  leaks:
    if: >
      ${{ github.event.inputs.environment == 'leaks' ||
          github.event_name == 'schedule' ||
          github.event.inputs.environment == 'full' ||
          github.event_name == 'pull_request' ||
          github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TruffleHog secret detection
        uses: trufflesecurity/trufflehog@main
        with:
          fetch-depth: "0"
          extra-args: "--only-verified"
