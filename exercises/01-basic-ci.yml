# Exercise 1: Basic CI Workflow
# 
# Learning Objectives:
# - Understand workflow syntax structure
# - Learn job and step definitions
# - Basic shell commands in GitHub Actions
# - Push-triggered automation
#
# This is the simplest possible CI workflow: it runs on every push to main,
# prints timestamps, and confirms completion. Foundation for understanding
# the execution model before adding complexity.

name: Basic CI Pipeline

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Initialize pipeline
        run: echo "Starting CI execution..."
      
      - name: Log execution timestamp
        run: date
      
      - name: Mark completion
        run: echo "CI pipeline completed successfully"
