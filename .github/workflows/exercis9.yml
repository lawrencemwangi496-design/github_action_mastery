---
name: security scan
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: " security scan"
        required: true
        default: vulnerabilities
        type: choice
        options:
          - vulnerabilities
          - dependencies
          - leaks
          - full
jobs:
  audit:
    if: >
      ${{ github.event.inputs.environment ==
      'dependencies' || github.event_name == 'schedule'||
      github.event.inputs.environment == 'full' ||
      github.event.name == 'pull_request' ||
       github.event.name == 'push' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: learnhub-central
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install dependencies
        run: npm ci
      - name: auditing
        run: npm audit --audit-level=high
  security:
    if: >
      ${{ github.event.inputs.environment ==
      'vulnerabilities' || github.event_name == 'schedule' ||
      github.event.inputs.environment == 'full' ||
      github.event.name == 'pull_request' ||
       github.event.name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "learnhub-central"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
  leaks:
    if: >
      ${{ github.event.inputs.environment ==
      'leaks' || github.event_name == 'schedule' ||
      github.event.inputs.environment == 'full' ||
      github.event.name == 'pull_request' ||
      github.event.name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: trufflehog scan
        uses: trufflesecurity/trufflehog@main
        with:
          fetch-depth: "0"
          extra-args: "--only-verified"