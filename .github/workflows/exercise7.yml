---
name: matrix
on:
  push:
    branches: [main]
jobs:
  python_test:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: "python"
    strategy:
      fail-fast: false
      matrix:
        python_version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest]
    steps:
      - name: load code
        uses: actions/checkout@v4
      - name: set up python
        uses: actions/setup-python@v4
        with:
          python_version: ${{ matrix.python_version }}
      - name: actual test
        run: |
          pip install -r requirements.txt
          pytest -v